<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free-Edu | ICT Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
background:#0b1020;
color:white;
font-family:Inter;
margin:0;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#0f162c;
position:sticky;
top:0;
}

.logo{
font-weight:800;
letter-spacing:3px;
color:#3a86ff;
}

.search{
padding:8px 15px;
border-radius:20px;
border:none;
background:#1c2445;
color:white;
}

.dashboard{
display:grid;
grid-template-columns:320px 1fr;
gap:25px;
padding:25px;
}

.sidebar{
background:#121933;
border-radius:15px;
padding:15px;
height:80vh;
overflow:auto;
}

.chapter{
margin-bottom:10px;
}

.chapter-title{
cursor:pointer;
padding:10px;
background:#1a2247;
border-radius:10px;
font-weight:700;
}

.lesson{
padding:10px 12px;
cursor:pointer;
opacity:.7;
}

.lesson:hover{
opacity:1;
background:#1e2a59;
}

.lesson.active{
color:#3a86ff;
opacity:1;
font-weight:700;
}

.player{
background:#121933;
border-radius:20px;
padding:20px;
}

iframe{
width:100%;
height:480px;
border-radius:15px;
border:none;
}

.title{
font-size:20px;
font-weight:800;
margin-bottom:10px;
}

.empty{
padding:120px;
text-align:center;
opacity:.6;
}

</style>

</head>

<body>

<nav>

<div class="logo">FREE-EDU</div>

<input class="search" id="search" placeholder="Search lesson">

</nav>

<div class="dashboard">

<div class="sidebar" id="sidebar"></div>

<div class="player">

<div id="empty" class="empty">
Select a lesson to start learning
</div>

<div id="playerBox" style="display:none">

<div class="title" id="videoTitle"></div>

<iframe id="player"></iframe>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
